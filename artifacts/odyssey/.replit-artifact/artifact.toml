kind = "mobile"
previewPath = "/"
title = "Odyssey"
version = "1.0.0"
id = "artifacts/odyssey"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20213

[services.development]
run = "pnpm --filter @workspace/odyssey run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/odyssey", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/odyssey", "run", "serve" ]

[services.env]
PORT = "20213"
BASE_PATH = "/"
